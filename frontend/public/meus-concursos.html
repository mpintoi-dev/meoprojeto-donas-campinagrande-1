<script>
(function(){
  function pad(n){ return n<10 ? '0'+n : ''+n; }
  function escape(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,function(c){return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]);}); }

  var now = new Date();
  var dataHoje  = pad(now.getDate()) + '/' + pad(now.getMonth()+1) + '/' + now.getFullYear();
  var horaAgora = pad(now.getHours()) + ':' + pad(now.getMinutes());

  var hoje = document.getElementById('cand-data-hoje');
  if(hoje) hoje.textContent = dataHoje;
  var ultimo = document.getElementById('cand-ultimo-acesso');
  if(ultimo) ultimo.textContent = dataHoje + ' ' + horaAgora;

  /* Lê dados do cadastro */
  var data = {};
  try { data = JSON.parse(sessionStorage.getItem('idecan_cadastro') || '{}') || {}; } catch(e){}

  var nomeEl = document.getElementById('cand-nome');
  if(nomeEl && data.nome) nomeEl.textContent = data.nome;
  var cpfEl = document.getElementById('cand-cpf');
  if(cpfEl && data.cpf) cpfEl.textContent = 'CPF: ' + data.cpf;

  /* Lê inscrição realizada (cargo escolhido na página passo2) */
  var inscricao = {};
  try { inscricao = JSON.parse(sessionStorage.getItem('idecan_inscricao') || '{}') || {}; } catch(e){}

  var bloco = document.getElementById('bloco-minhas-inscricoes');
  var tbody = document.querySelector('#tabela-minhas-inscricoes tbody');
  if(bloco && tbody && inscricao && inscricao.concurso){
    var protocolo = 'IDC' + (Date.now().toString().slice(-8));
    var dataInscricao = dataHoje + ' ' + horaAgora;
    var cargoLabel = (inscricao.codigo ? inscricao.codigo + ' - ' : '') + (inscricao.titulo || '') + (inscricao.jornada ? ' - ' + inscricao.jornada : '');
    var html =
      '<tr>' +
        '<td width="60" height="60">' +
          '<img src="/assets/2ec2fab246f275bb.jpg" width="60" height="60" alt="' + escape(inscricao.concurso) + '" class="bordaImagem1">' +
        '</td>' +
        '<td>' +
          '<a href="#" style="font-weight:bold">' + escape(inscricao.concurso) + '</a>' +
          '<br><span class="txt2">Cargo: <b>' + escape(cargoLabel) + '</b></span>' +
          '<br><span class="txt2">Localidade: ' + escape(inscricao.localidade || 'CAMPINA GRANDE/PB') + '</span>' +
          '<br><span class="txt2">Inscrição realizada em: ' + escape(dataInscricao) + ' &nbsp;|&nbsp; Protocolo: <b>' + escape(protocolo) + '</b></span>' +
        '</td>' +
        '<td align="right" style="vertical-align:middle">' +
          '<span style="background:#fef3c7;color:#92400e;border:1px solid #fcd34d;border-radius:14px;padding:5px 12px;font-size:11px;font-weight:bold;display:inline-block">' +
            'AGUARDANDO PAGAMENTO' +
          '</span>' +
          '<br><span class="txt2" style="display:inline-block;margin-top:6px"><b>Taxa: ' + escape(inscricao.taxa || '') + '</b></span>' +
        '</td>' +
      '</tr>';
    tbody.innerHTML = html;
    bloco.style.display = 'block';
  }
})();
</script>
